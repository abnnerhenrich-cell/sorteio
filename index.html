Object.assign(window,{showPage,openParticipar,selecionarDezena,selecionarDezenaPublica,abrirFormularioParticipacao,closeModal,salvarParticipacao,openLogin,loginAdmin,logoutAdmin,adminTab,criarSorteio,toggleSorteio,excluirSorteio,sortearGanhador,salvarAparencia,limparTudo,filtrarParticipantes,filtrarSelectGanhador,atualizarFiltroDezena,aplicarFiltroGanhador,escolherGanhador});
function iniciarFirebase(){onSnapshot(collection(firestore,'sorteios'),snap=>{sorteios=snap.docs.map(d=>({id:d.id,...d.data()}));renderAll()},err=>alert('Erro ao carregar sorteios: '+err.message));onSnapshot(collection(firestore,'participantes'),snap=>{participantes=snap.docs.map(d=>({id:d.id,...d.data()}));renderAll()},err=>alert('Erro ao carregar participantes: '+err.message));onSnapshot(collection(firestore,'ganhadores'),snap=>{ganhadores=snap.docs.map(d=>({id:d.id,...d.data()}));renderAll()},err=>alert('Erro ao carregar ganhadores: '+err.message));onSnapshot(doc(firestore,'config','site'),snap=>{if(snap.exists())settings={...settings,...snap.data()};renderAll()},err=>console.warn(err))}
function showPage(p){['homePage','ganhadoresPage','adminPage'].forEach(id=>$(id).classList.add('hidden'));if(p==='admin'&&sessionStorage.getItem('adminLogado')!=='sim')return openLogin();$(p+'Page').classList.remove('hidden');renderAll();if(p==='admin')adminTab(activeAdminTab)}
function todasDezenas(){return Array.from({length:100},(_,i)=>String(i).padStart(2,'0'))}function todosGrupos(){return Array.from({length:24},(_,i)=>String(i+2).padStart(2,'0'))}function getTipoSorteio(s){return s?.tipoSorteio==='grupo'?'grupo':'dezena'}function getNomeTipo(s){return getTipoSorteio(s)==='grupo'?'grupo':'dezena'}function getNomeTipoPlural(s){return getTipoSorteio(s)==='grupo'?'grupos':'dezenas'}function getLimiteDezenas(s){return Math.max(1,Number(s?.limiteDezenas||1))}function opcoesDoSorteio(s){return getTipoSorteio(s)==='grupo'?todosGrupos():todasDezenas()}function numerosDoParticipante(p){return Array.isArray(p?.numeros)?p.numeros:(Array.isArray(p?.dezenas)?p.dezenas:(p?.dezena?String(p.dezena).split(',').map(x=>x.trim()).filter(Boolean):[]))}function numerosOcupados(id){return participantes.filter(p=>p.sorteioId===id).flatMap(numerosDoParticipante)}function nomePorNumero(id,n){const p=participantes.find(p=>p.sorteioId===id&&numerosDoParticipante(p).includes(n));return p?p.nome:'LIVRE'}function trunc(t,n=14){t=String(t||'');return t.length>n?t.slice(0,n-3)+'...':t}function formatDate(d){if(!d)return'';if(String(d).includes('-')){const[y,m,day]=String(d).split('-');return`${day}/${m}/${y}`}return d}function normalizarWhats(w){return String(w||'').replace(/[^0-9]/g,'')}function escapeHtml(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function renderAll(){$('siteLogo').textContent=settings.nome||'KELLY SORTEIOS';$('footerName').textContent=settings.rodape||'Kelly Menezes';$('year').textContent=new Date().getFullYear();const link=$('cadastroBtn');link.href=settings.cadastroUrl||'#';link.style.pointerEvents=settings.cadastroUrl?'auto':'none';link.style.opacity=settings.cadastroUrl?'1':'.75';const ativos=sorteios.filter(s=>s.status==='ativo');$('sorteiosGrid').innerHTML=ativos.map(renderSorteioPublico).join('')||'<div class="card" style="text-align:center">Nenhum sorteio ativo no momento.</div>';$('ganhadoresGrid').innerHTML=ganhadores.map(g=>`<div class="card"><h3>🏆 ${escapeHtml(g.nome)}</h3><p>Sorteio: ${escapeHtml(g.sorteioTitulo)}</p><h2 style="color:var(--yellow);margin:10px 0">${escapeHtml(g.premio)}</h2><p>Dezena/Grupo: <strong>${escapeHtml((g.numeros||g.dezenas||[g.dezena]).filter(Boolean).join(', ')||'-')}</strong></p><p>WhatsApp: ${escapeHtml(g.whats)}</p><p>Data: ${formatDate(g.data)}</p></div>`).join('')||'<div class="card">Nenhum ganhador divulgado ainda.</div>';renderAdmin()}
function renderSorteioPublico(s){const ocupadas=numerosOcupados(s.id),total=opcoesDoSorteio(s).length,limite=getLimiteDezenas(s);return `<div class="card"><div class="top-public"><div class="date-pill">📅 DIA ${formatDate(s.data)}</div><div class="count-pill">🏆 SORTEIO DAS DEZENAS • 00 A ${getTipoSorteio(s)==='grupo'?'25':'99'}</div><h1 class="section-title">DEZENAS DA SORTE</h1><p class="lead">Primeiro escolha a dezena na tela principal. Depois preencha somente nome e WhatsApp.</p><div class="count-pill"># ${ocupadas.length} de ${total} já marcadas</div></div><div class="draw-meta"><div class="meta-card"><small>🎟️ Loteria</small><strong>${escapeHtml(s.loteria||'')}</strong></div><div class="meta-card"><small>🕘 Horário</small><strong>${escapeHtml(s.horario||'')}</strong></div><div class="meta-card"><small>🎁 Prêmio</small><strong class="premio">${escapeHtml(s.premio||'')}</strong></div></div><div class="dezenas-publicas">${opcoesDoSorteio(s).map(n=>`<button class="dezena-card ${ocupadas.includes(n)?'ocupada':''} ${currentSorteioId===s.id&&selectedDezenas.includes(n)?'selecionada':''}" ${ocupadas.includes(n)?'disabled':''} onclick="selecionarDezenaPublica('${s.id}','${n}')"><span class="dezena-num">${n}</span><span class="dezena-nome">${escapeHtml(trunc(nomePorNumero(s.id,n)))}</span></button>`).join('')}</div>${currentSorteioId===s.id&&selectedDezenas.length?`<div class="selecionadas-bar"><div>Dezena(s) escolhida(s): <strong>${selectedDezenas.join(', ')}</strong><br><small>Limite: ${limite} por pessoa</small></div><button class="btn ok" onclick="abrirFormularioParticipacao('${s.id}')">Continuar cadastro</button></div>`:''}</div>`}
function selecionarDezenaPublica(id,d){const s=sorteios.find(x=>x.id===id);if(!s)return alert('Sorteio não encontrado.');if(currentSorteioId!==id){currentSorteioId=id;selectedDezenas=[]}const limite=getLimiteDezenas(s);const ocupadas=numerosOcupados(id);if(ocupadas.includes(d))return alert('Esta dezena já foi escolhida.');if(selectedDezenas.includes(d))selectedDezenas=selectedDezenas.filter(x=>x!==d);else{if(selectedDezenas.length>=limite)return alert('Este sorteio permite escolher até '+limite+' dezena(s).');selectedDezenas.push(d)}renderAll()}
function abrirFormularioParticipacao(id){currentSorteioId=id;const s=sorteios.find(x=>x.id===id);if(!s)return alert('Sorteio não encontrado.');if(!selectedDezenas.length)return alert('Escolha a dezena na tela principal primeiro.');$('participarInfo').innerHTML=`<p class="lead"><strong>${escapeHtml(s.titulo||'Sorteio')}</strong><br>${escapeHtml(s.premio||'')}</p><div class="notice">Dezena(s) escolhida(s): <strong>${selectedDezenas.join(', ')}</strong></div>`;$('participarModal').classList.remove('hidden')}
function openParticipar(id){currentSorteioId=id;selectedDezenas=[];renderAll();alert('Escolha a dezena na tela principal. Depois clique em Continuar cadastro.')}
function selecionarDezena(d){selecionarDezenaPublica(currentSorteioId,d)}function closeModal(id){$(id).classList.add('hidden')}
async function salvarParticipacao(){try{const nome=$('pNome').value.trim(),whats=$('pWhats').value.trim(),cpf='',whatsLimpo=normalizarWhats(whats);if(!nome||!whats)return alert('Preencha nome e WhatsApp.');if(whatsLimpo.length<10||whatsLimpo.length>11)return alert('Digite um WhatsApp válido com DDD.');const s=sorteios.find(x=>x.id===currentSorteioId);if(!s)return alert('Sorteio não encontrado.');const limite=getLimiteDezenas(s);if(!selectedDezenas.length)return alert('Escolha uma dezena.');if(selectedDezenas.length>limite)return alert('Limite atingido.');const snapWhats=await getDocs(query(collection(firestore,'participantes'),where('sorteioId','==',s.id),where('whatsLimpo','==',whatsLimpo)));if(!snapWhats.empty)return alert('Este WhatsApp já participou deste sorteio.');const ocupadas=numerosOcupados(s.id);for(const dez of selectedDezenas){if(ocupadas.includes(dez))return alert('A dezena '+dez+' já foi escolhida.');const snapNum=await getDocs(query(collection(firestore,'participantes'),where('sorteioId','==',s.id),where('numeros','array-contains',dez)));if(!snapNum.empty)return alert('A dezena '+dez+' já foi escolhida.')}await addDoc(collection(firestore,'participantes'),{sorteioId:s.id,sorteioTitulo:s.titulo||'Sorteio',nome,whats,whatsLimpo,cpf,tipoSorteio:getTipoSorteio(s),numeros:selectedDezenas,dezenas:selectedDezenas,dezena:selectedDezenas.join(', '),data:new Date().toISOString().slice(0,10),criadoEm:serverTimestamp()});$('pNome').value='';$('pWhats').value='';selectedDezenas=[];closeModal('participarModal');alert('Participação confirmada!')}catch(e){alert('Erro ao salvar participação: '+e.message)}}
function openLogin(){$('loginModal').classList.remove('hidden')}function loginAdmin(){if($('adminSenha').value===ADMIN_PASSWORD){sessionStorage.setItem('adminLogado','sim');closeModal('loginModal');showPage('admin')}else alert('Senha incorreta.')}function logoutAdmin(){sessionStorage.removeItem('adminLogado');showPage('home')}function adminTab(tab){activeAdminTab=tab;document.querySelectorAll('.admin-tab').forEach(e=>e.classList.add('hidden'));const el=$('tab'+tab[0].toUpperCase()+tab.slice(1));if(el)el.classList.remove('hidden');document.querySelectorAll('#adminSidebar button[data-tab]').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab))}
function renderAdmin(){if(sessionStorage.getItem('adminLogado')!=='sim')return;const active=document.activeElement;const activeId=active&&active.id;const activeVal=active&&('value'in active)?active.value:null;$('tabDashboard').innerHTML=`<h2 class="section-title">Painel Admin</h2><div class="stats"><div class="stat"><strong>${sorteios.length}</strong>Sorteios</div><div class="stat"><strong>${participantes.length}</strong>Participantes</div><div class="stat"><strong>${ganhadores.length}</strong>Premiados</div></div><div class="notice">Corrigido: painel sem travar, escolhas de dezenas atualizando, e exclusão apaga participantes/ganhadores do sorteio.</div>`;$('tabSorteios').innerHTML=`<h2 class="section-title">Gerenciar Sorteios</h2><div class="form"><input id="sTitulo" placeholder="Título interno do sorteio"><input id="sLoteria" placeholder="Nome da loteria"><input id="sHorario" placeholder="Horário. Ex: 21H"><input id="sPremio" placeholder="Prêmio"><textarea id="sDesc" placeholder="Descrição"></textarea><input id="sData" type="date"><label>Tipo do sorteio</label><select id="sTipoSorteio"><option value="dezena">Dezenas 00 a 99</option><option value="grupo">Grupos 02 a 25</option></select><label>Quantidade por cliente</label><select id="sLimiteDezenas"><option value="1">1 opção por cliente</option><option value="2">2 opções por cliente</option></select><button class="btn ok" onclick="criarSorteio()">➕ Criar Sorteio</button></div><br>${tableSorteios()}`;$('tabParticipantes').innerHTML=`<h2 class="section-title">Participantes</h2><div class="form"><input id="filtroParticipantes" oninput="filtrarParticipantes()" placeholder="Pesquisar por dezena, nome, WhatsApp ou sorteio"></div><br>${tableParticipantes()}`;$('tabPremiados').innerHTML=`<h2 class="section-title">Selecionar Ganhador</h2><div class="form"><label>Sorteio</label><select id="filtroSorteioGanhador" onchange="atualizarFiltroDezena()"><option value="">Selecione o sorteio</option>${sorteios.map(s=>`<option value="${s.id}">${escapeHtml(s.titulo||'Sorteio')} ${s.loteria?'- '+escapeHtml(s.loteria):''}</option>`).join('')}</select><label>Dezena/Grupo sorteado</label><select id="filtroNumeroGanhador" onchange="aplicarFiltroGanhador()"><option value="">Primeiro selecione o sorteio</option></select><div id="resultadoFiltroGanhador" class="resultado-filtro"></div><hr style="border-color:rgba(255,255,255,.12);width:100%"><input id="buscaGanhador" oninput="filtrarSelectGanhador()" placeholder="Ou pesquise manualmente por dezena, nome ou sorteio"><select id="ganhadorManual"><option value="">Selecione o ganhador</option>${participantes.map(p=>`<option value="${p.id}" data-busca="${escapeHtml((numerosDoParticipante(p).join(' ')+' '+p.nome+' '+p.whats+' '+p.sorteioTitulo).toLowerCase())}">${escapeHtml(numerosDoParticipante(p).join(', '))} - ${escapeHtml(p.nome)} | ${escapeHtml(p.sorteioTitulo)}</option>`).join('')}</select><button class="btn ok" onclick="sortearGanhador()">🏆 Confirmar Ganhador</button></div><br>${tableGanhadores()}`;$('tabAparencia').innerHTML=`<h2 class="section-title">Aparência</h2><div class="form"><label>Nome do site</label><input id="setNome" value="${escapeHtml(settings.nome||'KELLY SORTEIOS')}"><label>Rodapé/assinatura</label><input id="setRodape" value="${escapeHtml(settings.rodape||'Kelly Menezes')}"><label>URL do botão de cadastro</label><input id="setCadastroUrl" value="${escapeHtml(settings.cadastroUrl||'')}" placeholder="https://seulink.com/cadastro"><button class="btn ok" onclick="salvarAparencia()">Salvar Aparência</button><button class="btn danger" onclick="limparTudo()">Limpar todos os dados</button></div>`;adminTab(activeAdminTab);if(activeId&&$(activeId)&&activeVal!==null){$(activeId).value=activeVal;$(activeId).focus()}}
function tableSorteios(){return `<div class="table-wrap"><table class="table"><tr><th>Título</th><th>Loteria</th><th>Horário</th><th>Prêmio</th><th>Reservados</th><th>Status</th><th>Ação</th></tr>${sorteios.map(s=>`<tr><td>${escapeHtml(s.titulo||'')}</td><td>${escapeHtml(s.loteria||'')}</td><td>${escapeHtml(s.horario||'')}</td><td>${escapeHtml(s.premio||'')}</td><td>${numerosOcupados(s.id).length}/${opcoesDoSorteio(s).length}</td><td>${escapeHtml(s.status||'')}</td><td><button class="secondary" onclick="toggleSorteio('${s.id}')">Ativar/Pausar</button> <button class="danger" onclick="excluirSorteio('${s.id}')">Excluir</button></td></tr>`).join('')}</table></div>`}function tableParticipantes(){return `<div class="table-wrap"><table class="table" id="tabelaParticipantes"><tr><th>Dezena/Grupo</th><th>Nome</th><th>WhatsApp</th><th>Sorteio</th></tr>${participantes.map(p=>{const nums=numerosDoParticipante(p).join(', ')||'-',busca=(nums+' '+p.nome+' '+p.whats+' '+(p.cpf||'')+' '+p.sorteioTitulo).toLowerCase();return `<tr data-busca="${escapeHtml(busca)}"><td><strong>${escapeHtml(nums)}</strong></td><td>${escapeHtml(p.nome)}</td><td>${escapeHtml(p.whats)}</td><td>${escapeHtml(p.sorteioTitulo)}</td></tr>`}).join('')}</table></div>`}function tableGanhadores(){return `<div class="table-wrap"><table class="table"><tr><th>Dezena/Grupo</th><th>Nome</th><th>Sorteio</th><th>Prêmio</th><th>Data</th></tr>${ganhadores.map(g=>`<tr><td><strong>${escapeHtml((g.numeros||g.dezenas||[g.dezena]).filter(Boolean).join(', '))}</strong></td><td>${escapeHtml(g.nome)}</td><td>${escapeHtml(g.sorteioTitulo)}</td><td>${escapeHtml(g.premio)}</td><td>${formatDate(g.data)}</td></tr>`).join('')}</table></div>`}
function filtrarParticipantes(){const termo=String($('filtroParticipantes')?.value||'').toLowerCase().trim();document.querySelectorAll('#tabelaParticipantes tr[data-busca]').forEach(tr=>tr.style.display=tr.dataset.busca.includes(termo)?'':'none')}function filtrarSelectGanhador(){const termo=String($('buscaGanhador')?.value||'').toLowerCase().trim();document.querySelectorAll('#ganhadorManual option').forEach((op,i)=>{if(i)op.hidden=!op.dataset.busca.includes(termo)})}
function atualizarFiltroDezena(){const id=$('filtroSorteioGanhador').value,s=sorteios.find(x=>x.id===id);$('filtroNumeroGanhador').innerHTML=s?'<option value="">Selecione a dezena/grupo</option>'+opcoesDoSorteio(s).map(n=>`<option value="${n}">${n}</option>`).join(''):'<option value="">Primeiro selecione o sorteio</option>';$('resultadoFiltroGanhador').innerHTML=''}function aplicarFiltroGanhador(){const id=$('filtroSorteioGanhador').value,num=$('filtroNumeroGanhador').value;const achados=participantes.filter(p=>p.sorteioId===id&&numerosDoParticipante(p).includes(num));if(!id||!num){$('resultadoFiltroGanhador').innerHTML='';return}if(!achados.length){$('resultadoFiltroGanhador').innerHTML='<div class="notice">Ninguém escolheu esta dezena/grupo.</div>';$('ganhadorManual').value='';return}$('resultadoFiltroGanhador').innerHTML=achados.map(p=>`<div class="winner-card"><strong>${escapeHtml(p.nome)}</strong><br>WhatsApp: ${escapeHtml(p.whats)}<br>Escolheu: ${escapeHtml(numerosDoParticipante(p).join(', '))}<br><button class="btn ok" onclick="escolherGanhador('${p.id}')">Usar este ganhador</button></div>`).join('');$('ganhadorManual').value=achados[0].id}function escolherGanhador(id){$('ganhadorManual').value=id;alert('Ganhador selecionado no campo abaixo.')}
async function criarSorteio(){try{if(!$('sTitulo').value.trim())return alert('Preencha o título.');await addDoc(collection(firestore,'sorteios'),{titulo:$('sTitulo').value.trim(),loteria:$('sLoteria').value.trim(),horario:$('sHorario').value.trim(),descricao:$('sDesc').value.trim(),premio:$('sPremio').value.trim(),status:'ativo',data:$('sData').value||new Date().toISOString().slice(0,10),tipoSorteio:$('sTipoSorteio').value||'dezena',limiteDezenas:Number($('sLimiteDezenas').value||1),criadoEm:serverTimestamp()});alert('Sorteio criado com sucesso.')}catch(e){alert('Erro ao criar sorteio: '+e.message)}}async function toggleSorteio(id){try{const s=sorteios.find(x=>x.id===id);await updateDoc(doc(firestore,'sorteios',id),{status:s?.status==='ativo'?'pausado':'ativo'})}catch(e){alert('Erro ao alterar sorteio: '+e.message)}}
async function excluirSorteio(id){try{if(!confirm('Excluir este sorteio? Os participantes e ganhadores dele também serão apagados automaticamente.'))return;const batch=writeBatch(firestore);batch.delete(doc(firestore,'sorteios',id));const partSnap=await getDocs(query(collection(firestore,'participantes'),where('sorteioId','==',id)));partSnap.forEach(item=>batch.delete(doc(firestore,'participantes',item.id)));const ganhSnap=await getDocs(query(collection(firestore,'ganhadores'),where('sorteioId','==',id)));ganhSnap.forEach(item=>batch.delete(doc(firestore,'ganhadores',item.id)));await batch.commit();alert('Sorteio, participantes e ganhadores apagados.')}catch(e){alert('Erro ao excluir: '+e.message)}}
async function sortearGanhador(){try{const participanteId=$('ganhadorManual').value;if(!participanteId)return alert('Selecione um participante para marcar como ganhador.');const p=participantes.find(x=>x.id===participanteId);if(!p)return alert('Participante não encontrado.');const s=sorteios.find(x=>x.id===p.sorteioId),numeros=numerosDoParticipante(p);if(ganhadores.some(g=>g.participanteId===p.id))return alert('Esse participante já está marcado como ganhador.');await addDoc(collection(firestore,'ganhadores'),{participanteId:p.id,nome:p.nome,whats:p.whats,cpf:p.cpf||'',tipoSorteio:p.tipoSorteio||getTipoSorteio(s),numeros,dezenas:numeros,dezena:numeros.join(', '),sorteioId:p.sorteioId,sorteioTitulo:p.sorteioTitulo,premio:s?.premio||'',data:new Date().toISOString().slice(0,10),criadoEm:serverTimestamp()});alert('Ganhador confirmado: '+p.nome)}catch(e){alert('Erro ao confirmar ganhador: '+e.message)}}
async function salvarAparencia(){try{await setDoc(doc(firestore,'config','site'),{nome:$('setNome').value||'KELLY SORTEIOS',rodape:$('setRodape').value||'Kelly Menezes',cadastroUrl:$('setCadastroUrl').value||''},{merge:true});alert('Aparência salva.')}catch(e){alert('Erro ao salvar aparência: '+e.message)}}async function limparTudo(){try{if(!confirm('Tem certeza? Isso apaga sorteios, participantes e ganhadores.'))return;let batch=writeBatch(firestore),count=0;for(const s of sorteios){batch.delete(doc(firestore,'sorteios',s.id));if(++count>=450){await batch.commit();batch=writeBatch(firestore);count=0}}for(const p of participantes){batch.delete(doc(firestore,'participantes',p.id));if(++count>=450){await batch.commit();batch=writeBatch(firestore);count=0}}for(const g of ganhadores){batch.delete(doc(firestore,'ganhadores',g.id));if(++count>=450){await batch.commit();batch=writeBatch(firestore);count=0}}await batch.commit();alert('Dados apagados.')}catch(e){alert('Erro ao limpar dados: '+e.message)}}
window.addEventListener('pointermove',e=>{document.documentElement.style.setProperty('--mx',e.clientX+'px');document.documentElement.style.setProperty('--my',e.clientY+'px')},{passive:true});iniciarFirebase();
</script>
