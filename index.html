/* ANIMAÇÕES E VISUAL REATIVO */
:root{--mx:50%;--my:20%}
body{background:radial-gradient(circle at var(--mx) var(--my),rgba(0,200,255,.28),transparent 26%),radial-gradient(circle at 82% 12%,rgba(36,107,255,.30),transparent 32%),linear-gradient(145deg,#020817,#041f46 54%,#021022);background-size:120% 120%;animation:bgMove 10s ease-in-out infinite alternate}
body:after{content:"";position:fixed;inset:-35%;pointer-events:none;background:conic-gradient(from 180deg at 50% 50%,transparent,rgba(0,200,255,.10),transparent,rgba(255,209,42,.08),transparent);filter:blur(30px);animation:spinGlow 18s linear infinite;z-index:0}.wrap,header,footer,.modal{position:relative;z-index:1}
.logo:before{animation:floatIcon 2.8s ease-in-out infinite, glowPulse 1.8s ease-in-out infinite alternate}.logo span{animation:neonText 2s ease-in-out infinite alternate}.alerta{animation:slideDown .55s ease both, glowPulse 2.2s ease-in-out infinite alternate}.cadastro-link{animation:slideDown .7s ease both;position:relative;overflow:hidden}.cadastro-link:after,button:after,.btn:after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 0%,rgba(255,255,255,.35) 45%,transparent 70%);transform:translateX(-130%);transition:.55s}.cadastro-link:hover:after,button:hover:after,.btn:hover:after{transform:translateX(130%)}button,.btn{position:relative;overflow:hidden;transition:transform .22s ease,filter .22s ease,box-shadow .22s ease}.card,.meta-card,.dezena-card,.winner-card,.stat{animation:fadeUp .55s ease both;transition:transform .25s ease,border-color .25s ease,box-shadow .25s ease,background .25s ease}.card:hover,.meta-card:hover,.stat:hover{transform:translateY(-6px) scale(1.01);border-color:rgba(0,200,255,.55);box-shadow:0 28px 85px rgba(0,200,255,.22)}.dezena-card{position:relative;overflow:hidden}.dezena-card:hover{transform:translateY(-6px) scale(1.045);border-color:rgba(255,209,42,.85);box-shadow:0 0 26px rgba(255,209,42,.25),0 18px 35px rgba(0,0,0,.28)}.dezena-card.ocupada{animation:takenPulse 2.2s ease-in-out infinite}.dezena-btn:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 0 22px rgba(0,200,255,.28)!important}.dezena-btn.selected{animation:selectedPop .28s ease, glowPulse 1.6s ease-in-out infinite alternate}.modal-box{animation:modalPop .28s ease both}.section-title{text-shadow:0 0 18px rgba(0,200,255,.26)}.premio,.dezena-num,.price{animation:neonYellow 1.8s ease-in-out infinite alternate}.table tr{transition:background .2s,transform .2s}.table tr:hover td{background:rgba(0,200,255,.06);transform:translateX(2px)}input,select,textarea{transition:border-color .2s,box-shadow .2s,transform .2s}input:focus,select:focus,textarea:focus{transform:translateY(-1px)}
@keyframes bgMove{0%{background-position:0% 0%}100%{background-position:100% 80%}}@keyframes spinGlow{to{transform:rotate(360deg)}}@keyframes floatIcon{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-5px) rotate(4deg)}}@keyframes glowPulse{0%{box-shadow:0 0 18px rgba(0,200,255,.25)}100%{box-shadow:0 0 36px rgba(0,200,255,.55)}}@keyframes neonText{0%{text-shadow:0 0 8px rgba(255,209,42,.35)}100%{text-shadow:0 0 20px rgba(255,209,42,.75),0 0 30px rgba(0,200,255,.28)}}@keyframes neonYellow{0%{text-shadow:0 0 8px rgba(255,209,42,.35)}100%{text-shadow:0 0 22px rgba(255,209,42,.85)}}@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}@keyframes modalPop{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}@keyframes selectedPop{50%{transform:scale(1.12)}}@keyframes takenPulse{0%,100%{box-shadow:0 0 0 rgba(255,209,42,0)}50%{box-shadow:0 0 20px rgba(255,209,42,.22)}}

function iniciarFirebase(){onSnapshot(collection(firestore,'sorteios'),s=>{sorteios=s.docs.map(d=>({id:d.id,...d.data()}));renderAll()});onSnapshot(collection(firestore,'participantes'),s=>{participantes=s.docs.map(d=>({id:d.id,...d.data()}));renderAll()});onSnapshot(collection(firestore,'ganhadores'),s=>{ganhadores=s.docs.map(d=>({id:d.id,...d.data()}));renderAll()});onSnapshot(doc(firestore,'config','site'),s=>{if(s.exists())settings={...settings,...s.data()};renderAll()})}
function showPage(p){homePage.classList.add('hidden');ganhadoresPage.classList.add('hidden');adminPage.classList.add('hidden');if(p==='home')homePage.classList.remove('hidden');if(p==='ganhadores')ganhadoresPage.classList.remove('hidden');if(p==='admin')adminPage.classList.remove('hidden');renderAll()}
function todasDezenas(){return Array.from({length:100},(_,i)=>String(i).padStart(2,'0'))}function todosGrupos(){return Array.from({length:26},(_,i)=>String(i).padStart(2,'0'))}function getTipoSorteio(s){return s?.tipoSorteio==='grupo'?'grupo':'dezena'}function getNomeTipo(s){return getTipoSorteio(s)==='grupo'?'grupo':'dezena'}function getNomeTipoPlural(s){return getTipoSorteio(s)==='grupo'?'grupos':'dezenas'}function getLimiteDezenas(s){return Number(s?.limiteDezenas||1)}function opcoesDoSorteio(s){return getTipoSorteio(s)==='grupo'?todosGrupos():todasDezenas()}function numerosDoParticipante(p){return Array.isArray(p.numeros)?p.numeros:(Array.isArray(p.dezenas)?p.dezenas:(p.dezena?String(p.dezena).split(',').map(x=>x.trim()).filter(Boolean):[]))}function numerosOcupados(id){return participantes.filter(p=>p.sorteioId===id).flatMap(numerosDoParticipante)}function nomePorNumero(id,n){const p=participantes.find(p=>p.sorteioId===id&&numerosDoParticipante(p).includes(n));return p?p.nome:'LIVRE'}function trunc(t,n=14){t=String(t||'');return t.length>n?t.slice(0,n-3)+'...':t}function formatDate(d){if(!d)return'-';if(String(d).includes('-')){const[y,m,day]=String(d).split('-');return`${day}/${m}/${y}`}return d}function normalizarWhats(w){return String(w||'').replace(/[^0-9]/g,'')}
function renderAll(){siteLogo.textContent=settings.nome||'KELLY SORTEIOS';footerName.textContent=settings.rodape||'Kelly Menezes';year.textContent=new Date().getFullYear();cadastroBtn.href=settings.cadastroUrl||'#';cadastroBtn.style.pointerEvents=settings.cadastroUrl?'auto':'none';cadastroBtn.style.opacity=settings.cadastroUrl?'1':'.75';const ativos=sorteios.filter(s=>s.status==='ativo');sorteiosGrid.innerHTML=ativos.map(renderSorteioPublico).join('')||'<div class="card" style="text-align:center">Nenhum sorteio ativo no momento.</div>';ganhadoresGrid.innerHTML=ganhadores.map(g=>`<div class="card"><h3>🏆 ${g.nome}</h3><p>Sorteio: ${g.sorteioTitulo}</p><h2 style="color:var(--yellow);margin:10px 0">${g.premio}</h2><p>Dezena/Grupo: <strong>${(g.numeros||g.dezenas||[g.dezena]).filter(Boolean).join(', ')||'-'}</strong></p><p>WhatsApp: ${g.whats}</p><p>Data: ${formatDate(g.data)}</p></div>`).join('')||'<div class="card">Nenhum ganhador divulgado ainda.</div>';renderAdmin()}
function renderSorteioPublico(s){const ocupadas=numerosOcupados(s.id),total=opcoesDoSorteio(s).length,livres=total-ocupadas.length;return `<div class="card"><div class="top-public"><div class="date-pill">📅 DIA ${formatDate(s.data)}</div><div class="count-pill">🏆 SORTEIO DAS DEZENAS • 00 A ${getTipoSorteio(s)==='grupo'?'25':'99'}</div><h1 class="section-title">DEZENAS DA SORTE</h1><p class="lead">Marque seu nome, WhatsApp e CPF em uma das dezenas para participar do sorteio.</p><div class="count-pill"># ${ocupadas.length} de ${total} já marcadas</div></div><div class="draw-meta"><div class="meta-card"><small>🎟️ Loteria</small><strong>${s.loteria||''}</strong></div><div class="meta-card"><small>🕘 Horário</small><strong>${s.horario||''}</strong></div><div class="meta-card"><small>🎁 Prêmio</small><strong class="premio">${s.premio||''}</strong></div></div><div class="dezenas-publicas">${opcoesDoSorteio(s).map(n=>`<button class="dezena-card ${ocupadas.includes(n)?'ocupada':''}" onclick="openParticipar('${s.id}')"><span class="dezena-num">${n}</span><span class="dezena-nome">${trunc(nomePorNumero(s.id,n))}</span></button>`).join('')}</div></div>`}
function openParticipar(id){currentSorteioId=id;selectedDezenas=[];const s=sorteios.find(x=>x.id===id),ocupadas=numerosOcupados(id),limite=getLimiteDezenas(s),tipo=getNomeTipo(s),plural=getNomeTipoPlural(s);participarInfo.innerHTML=`<p class="lead"><strong>${s.titulo||'Sorteio'}</strong><br>${s.premio||''}</p><div class="notice">Selecione ${limite===1?'1 opção disponível':'até '+limite+' opções disponíveis'}.</div><div class="dezenas-grid">${opcoesDoSorteio(s).map(d=>`<button class="dezena-btn ${ocupadas.includes(d)?'taken':''}" ${ocupadas.includes(d)?'disabled':''} onclick="selecionarDezena('${d}')">${d}</button>`).join('')}</div><div id="dezenaEscolhida" class="notice hidden"></div>`;participarModal.classList.remove('hidden')}
function selecionarDezena(d){const s=sorteios.find(x=>x.id===currentSorteioId),limite=getLimiteDezenas(s);if(selectedDezenas.includes(d))selectedDezenas=selectedDezenas.filter(x=>x!==d);else{if(selectedDezenas.length>=limite)return alert('Limite atingido.');selectedDezenas.push(d)}document.querySelectorAll('.dezena-btn').forEach(b=>b.classList.remove('selected'));selectedDezenas.forEach(x=>[...document.querySelectorAll('.dezena-btn')].find(b=>b.textContent===x)?.classList.add('selected'));dezenaEscolhida.textContent='Escolhido(s): '+selectedDezenas.join(', ');dezenaEscolhida.classList.toggle('hidden',selectedDezenas.length===0)}function closeModal(id){document.getElementById(id).classList.add('hidden')}
async function salvarParticipacao(){const nome=pNome.value.trim(),whats=pWhats.value.trim(),whatsLimpo=normalizarWhats(whats);if(!nome||!whats)return alert('Preencha nome e WhatsApp.');if(whatsLimpo.length<10||whatsLimpo.length>11)return alert('Digite um WhatsApp válido com DDD.');const s=sorteios.find(x=>x.id===currentSorteioId),limite=getLimiteDezenas(s);if(!selectedDezenas.length)return alert('Escolha uma dezena.');if(selectedDezenas.length>limite)return alert('Limite atingido.');const snapWhats=await getDocs(query(collection(firestore,'participantes'),where('sorteioId','==',s.id),where('whatsLimpo','==',whatsLimpo)));if(!snapWhats.empty)return alert('Este WhatsApp já participou deste sorteio.');const ocupadas=numerosOcupados(s.id);for(const dez of selectedDezenas){if(ocupadas.includes(dez))return alert('A dezena '+dez+' já foi escolhida.')}await addDoc(collection(firestore,'participantes'),{sorteioId:s.id,sorteioTitulo:s.titulo||'Sorteio',nome,whats,whatsLimpo,tipoSorteio:getTipoSorteio(s),numeros:selectedDezenas,dezenas:selectedDezenas,dezena:selectedDezenas.join(', '),data:new Date().toISOString().slice(0,10),criadoEm:serverTimestamp()});pNome.value='';pWhats.value='';closeModal('participarModal');alert('Participação confirmada!')}
function openLogin(){loginModal.classList.remove('hidden')}function loginAdmin(){if(adminSenha.value===ADMIN_PASSWORD){sessionStorage.setItem('adminLogado','sim');closeModal('loginModal');showPage('admin')}else alert('Senha incorreta.')}function logoutAdmin(){sessionStorage.removeItem('adminLogado');showPage('home')}function adminTab(tab){document.querySelectorAll('.admin-tab').forEach(e=>e.classList.add('hidden'));document.getElementById('tab'+tab[0].toUpperCase()+tab.slice(1)).classList.remove('hidden')}
function renderAdmin(){if(sessionStorage.getItem('adminLogado')!=='sim')return;tabDashboard.innerHTML=`<h2 class="section-title">Painel Admin</h2><div class="stats"><div class="stat"><strong>${sorteios.length}</strong>Sorteios</div><div class="stat"><strong>${participantes.length}</strong>Participantes</div><div class="stat"><strong>${ganhadores.length}</strong>Premiados</div></div><div class="notice">Ao excluir um sorteio, os participantes e ganhadores dele são apagados automaticamente.</div>`;tabSorteios.innerHTML=`<h2 class="section-title">Gerenciar Sorteios</h2><div class="form"><input id="sTitulo" placeholder="Título interno do sorteio"><input id="sLoteria" placeholder="Nome da loteria"><input id="sHorario" placeholder="Horário. Ex: 21H"><input id="sPremio" placeholder="Prêmio"><textarea id="sDesc" placeholder="Descrição"></textarea><input id="sData" type="date"><label>Tipo do sorteio</label><select id="sTipoSorteio"><option value="dezena">Dezenas 00 a 99</option><option value="grupo">Grupos 00 a 25</option></select><label>Quantidade por cliente</label><select id="sLimiteDezenas"><option value="1">1 opção por cliente</option><option value="2">2 opções por cliente</option></select><button class="btn ok" onclick="criarSorteio()">➕ Criar Sorteio</button></div><br>${tableSorteios()}`;tabParticipantes.innerHTML=`<h2 class="section-title">Participantes</h2><div class="form"><input id="filtroParticipantes" oninput="filtrarParticipantes()" placeholder="Pesquisar por dezena, nome, WhatsApp ou sorteio"></div><br>${tableParticipantes()}`;tabPremiados.innerHTML=`<h2 class="section-title">Selecionar Ganhador</h2><div class="form"><label>Sorteio</label><select id="filtroSorteioGanhador" onchange="atualizarFiltroDezena()"><option value="">Selecione o sorteio</option>${sorteios.map(s=>`<option value="${s.id}">${s.titulo||'Sorteio'} ${s.loteria?'- '+s.loteria:''}</option>`).join('')}</select><label>Dezena/Grupo sorteado</label><select id="filtroNumeroGanhador" onchange="aplicarFiltroGanhador()"><option value="">Primeiro selecione o sorteio</option></select><div id="resultadoFiltroGanhador" class="resultado-filtro"></div><hr style="border-color:rgba(255,255,255,.12);width:100%"><input id="buscaGanhador" oninput="filtrarSelectGanhador()" placeholder="Ou pesquise manualmente por dezena, nome ou sorteio"><select id="ganhadorManual"><option value="">Selecione o ganhador</option>${participantes.map(p=>`<option value="${p.id}" data-busca="${(numerosDoParticipante(p).join(' ')+' '+p.nome+' '+p.whats+' '+p.sorteioTitulo).toLowerCase()}">${numerosDoParticipante(p).join(', ')} - ${p.nome} | ${p.sorteioTitulo}</option>`).join('')}</select><button class="btn ok" onclick="sortearGanhador()">🏆 Confirmar Ganhador</button></div><br>${tableGanhadores()}`;tabAparencia.innerHTML=`<h2 class="section-title">Aparência</h2><div class="form"><label>Nome do site</label><input id="setNome" value="${settings.nome||'KELLY SORTEIOS'}"><label>Rodapé/assinatura</label><input id="setRodape" value="${settings.rodape||'Kelly Menezes'}"><label>URL do botão de cadastro</label><input id="setCadastroUrl" value="${settings.cadastroUrl||''}" placeholder="https://seulink.com/cadastro"><button class="btn ok" onclick="salvarAparencia()">Salvar Aparência</button><button class="btn danger" onclick="limparTudo()">Limpar todos os dados</button></div>`}
function tableSorteios(){return `<div class="table-wrap"><table class="table"><tr><th>Título</th><th>Loteria</th><th>Horário</th><th>Prêmio</th><th>Reservados</th><th>Status</th><th>Ação</th></tr>${sorteios.map(s=>`<tr><td>${s.titulo||''}</td><td>${s.loteria||''}</td><td>${s.horario||''}</td><td>${s.premio||''}</td><td>${numerosOcupados(s.id).length}/${opcoesDoSorteio(s).length}</td><td>${s.status}</td><td><button class="secondary" onclick="toggleSorteio('${s.id}')">Ativar/Pausar</button> <button class="danger" onclick="excluirSorteio('${s.id}')">Excluir</button></td></tr>`).join('')}</table></div>`}function tableParticipantes(){return `<div class="table-wrap"><table class="table" id="tabelaParticipantes"><tr><th>Dezena/Grupo</th><th>Nome</th><th>WhatsApp</th><th>Sorteio</th></tr>${participantes.map(p=>{const nums=numerosDoParticipante(p).join(', ')||'-',busca=(nums+' '+p.nome+' '+p.whats+' '+p.sorteioTitulo).toLowerCase();return `<tr data-busca="${busca}"><td><strong>${nums}</strong></td><td>${p.nome}</td><td>${p.whats}</td><td>${p.sorteioTitulo}</td></tr>`}).join('')}</table></div>`}function tableGanhadores(){return `<div class="table-wrap"><table class="table"><tr><th>Dezena/Grupo</th><th>Nome</th><th>Sorteio</th><th>Prêmio</th><th>Data</th></tr>${ganhadores.map(g=>`<tr><td><strong>${(g.numeros||g.dezenas||[g.dezena]).filter(Boolean).join(', ')}</strong></td><td>${g.nome}</td><td>${g.sorteioTitulo}</td><td>${g.premio}</td><td>${formatDate(g.data)}</td></tr>`).join('')}</table></div>`}
function filtrarParticipantes(){const termo=String(filtroParticipantes?.value||'').toLowerCase().trim();document.querySelectorAll('#tabelaParticipantes tr[data-busca]').forEach(tr=>tr.style.display=tr.dataset.busca.includes(termo)?'':'none')}function filtrarSelectGanhador(){const termo=String(buscaGanhador?.value||'').toLowerCase().trim();document.querySelectorAll('#ganhadorManual option').forEach((op,i)=>{if(i)op.hidden=!op.dataset.busca.includes(termo)})}
function atualizarFiltroDezena(){const id=filtroSorteioGanhador.value,s=sorteios.find(x=>x.id===id);filtroNumeroGanhador.innerHTML=s?'<option value="">Selecione a dezena/grupo</option>'+opcoesDoSorteio(s).map(n=>`<option value="${n}">${n}</option>`).join(''):'<option value="">Primeiro selecione o sorteio</option>';resultadoFiltroGanhador.innerHTML=''}function aplicarFiltroGanhador(){const id=filtroSorteioGanhador.value,num=filtroNumeroGanhador.value;const achados=participantes.filter(p=>p.sorteioId===id&&numerosDoParticipante(p).includes(num));if(!id||!num){resultadoFiltroGanhador.innerHTML='';return}if(!achados.length){resultadoFiltroGanhador.innerHTML='<div class="notice">Ninguém escolheu esta dezena/grupo.</div>';ganhadorManual.value='';return}resultadoFiltroGanhador.innerHTML=achados.map(p=>`<div class="winner-card"><strong>${p.nome}</strong><br>WhatsApp: ${p.whats}<br>Escolheu: ${numerosDoParticipante(p).join(', ')}<br><button class="btn ok" onclick="escolherGanhador('${p.id}')">Usar este ganhador</button></div>`).join('');ganhadorManual.value=achados[0].id}function escolherGanhador(id){ganhadorManual.value=id;alert('Ganhador selecionado no campo abaixo.')}
async function criarSorteio(){if(!sTitulo.value)return alert('Preencha o título.');await addDoc(collection(firestore,'sorteios'),{titulo:sTitulo.value,loteria:sLoteria.value||'',horario:sHorario.value||'',descricao:sDesc.value||'',premio:sPremio.value||'',status:'ativo',data:sData.value||new Date().toISOString().slice(0,10),tipoSorteio:sTipoSorteio.value||'dezena',limiteDezenas:Number(sLimiteDezenas.value||1),criadoEm:serverTimestamp()})}async function toggleSorteio(id){const s=sorteios.find(x=>x.id===id);await updateDoc(doc(firestore,'sorteios',id),{status:s.status==='ativo'?'pausado':'ativo'})}
async function excluirSorteio(id){if(!confirm('Excluir este sorteio? Os participantes e ganhadores dele também serão apagados automaticamente.'))return;const batch=writeBatch(firestore);batch.delete(doc(firestore,'sorteios',id));const partSnap=await getDocs(query(collection(firestore,'participantes'),where('sorteioId','==',id)));partSnap.forEach(item=>batch.delete(doc(firestore,'participantes',item.id)));const ganhSnap=await getDocs(query(collection(firestore,'ganhadores'),where('sorteioId','==',id)));ganhSnap.forEach(item=>batch.delete(doc(firestore,'ganhadores',item.id)));await batch.commit();alert('Sorteio, participantes e ganhadores apagados.')}
async function sortearGanhador(){const participanteId=ganhadorManual.value;if(!participanteId)return alert('Selecione um participante para marcar como ganhador.');const p=participantes.find(x=>x.id===participanteId);if(!p)return alert('Participante não encontrado.');const s=sorteios.find(x=>x.id===p.sorteioId),numeros=numerosDoParticipante(p);if(ganhadores.some(g=>g.participanteId===p.id))return alert('Esse participante já está marcado como ganhador.');await addDoc(collection(firestore,'ganhadores'),{participanteId:p.id,nome:p.nome,whats:p.whats,tipoSorteio:p.tipoSorteio||getTipoSorteio(s),numeros,dezenas:numeros,dezena:numeros.join(', '),sorteioId:p.sorteioId,sorteioTitulo:p.sorteioTitulo,premio:s?.premio||'',data:new Date().toISOString().slice(0,10),criadoEm:serverTimestamp()});alert('Ganhador confirmado: '+p.nome)}
async function salvarAparencia(){await setDoc(doc(firestore,'config','site'),{nome:setNome.value||'KELLY SORTEIOS',rodape:setRodape.value||'Kelly Menezes',cadastroUrl:setCadastroUrl.value||''},{merge:true});alert('Aparência salva.')}async function limparTudo(){if(!confirm('Tem certeza? Isso apaga sorteios, participantes e ganhadores.'))return;const batch=writeBatch(firestore);sorteios.forEach(s=>batch.delete(doc(firestore,'sorteios',s.id)));participantes.forEach(p=>batch.delete(doc(firestore,'participantes',p.id)));ganhadores.forEach(g=>batch.delete(doc(firestore,'ganhadores',g.id)));await batch.commit()}

// brilho reativo seguindo o toque/mouse
window.addEventListener('pointermove',e=>{document.documentElement.style.setProperty('--mx',e.clientX+'px');document.documentElement.style.setProperty('--my',e.clientY+'px');},{passive:true});

iniciarFirebase();
</script>
</body>
